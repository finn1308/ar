<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artivive Web Clone - Hồng Hạnh AR</title>
  
  <!-- Nhúng thư viện A-Frame -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <!-- Nhúng thư viện MindAR dành cho A-Frame -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: #000;
    }

    /* Màn hình chờ tương tác */
    #ui-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
      padding: 20px;
    }

    #start-btn {
      padding: 15px 40px;
      font-size: 20px;
      font-weight: bold;
      color: white;
      background: linear-gradient(45deg, #fe2c55, #ff1493);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(255, 20, 147, 0.4);
    }

    #scanning-status {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 14px;
      z-index: 100;
      display: none;
      border: 1px solid rgba(255,255,255,0.3);
    }

    /* Khung quét giả lập trên màn hình */
    #scan-guide {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70vw;
      height: 70vh;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 10px;
      pointer-events: none;
      display: none;
      z-index: 50;
    }
  </style>
</head>
<body>

  <div id="ui-overlay">
    <h2 style="margin-bottom: 10px;">Sẵn sàng trải nghiệm AR</h2>
    <p style="margin-bottom: 30px; opacity: 0.8;">Vui lòng nhấn nút dưới đây và đưa camera về phía ảnh "Hồng Hạnh"</p>
    <button id="start-btn">MỞ CAMERA</button>
  </div>

  <div id="scanning-status">Đang tìm hình ảnh...</div>
  <div id="scan-guide"></div>

  <!-- Cấu hình MindAR với tệp của bạn: targets.mind -->
  <a-scene 
    mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiScanning: no;" 
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">
    
    <a-assets>
      <!-- Tệp video.mp4 phải nằm cùng thư mục -->
      <video id="ar-video" 
             src="video.mp4" 
             crossorigin="anonymous" 
             loop="true" 
             playsinline 
             webkit-playsinline>
      </video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Target nhận diện -->
    <a-entity id="target" mindar-image-target="targetIndex: 0">
      <!-- 
        Điều chỉnh kích thước: Ảnh Hồng Hạnh là khổ dọc.
        Tỉ lệ 1 : 1.5 là phù hợp nhất cho ảnh chân dung này.
      -->
      <a-video src="#ar-video" position="0 0 0" width="1" height="1.5" rotation="0 0 0"></a-video>
    </a-entity>
    
  </a-scene>

  <script>
    const startBtn = document.querySelector("#start-btn");
    const uiOverlay = document.querySelector("#ui-overlay");
    const sceneEl = document.querySelector('a-scene');
    const videoEl = document.querySelector('#ar-video');
    const targetEl = document.querySelector('#target');
    const scanningStatus = document.querySelector('#scanning-status');
    const scanGuide = document.querySelector('#scan-guide');

    startBtn.addEventListener("click", () => {
      uiOverlay.style.display = "none";
      scanningStatus.style.display = "block";
      scanGuide.style.display = "block";
      
      // Khởi động hệ thống AR
      sceneEl.systems["mindar-image-system"].start();
      videoEl.load();
    });

    // Khi tìm thấy ảnh
    targetEl.addEventListener("targetFound", () => {
      scanningStatus.innerText = "Đã nhận diện!";
      scanningStatus.style.color = "#00ff00";
      scanGuide.style.display = "none";
      videoEl.play();
    });

    // Khi mất dấu ảnh
    targetEl.addEventListener("targetLost", () => {
      scanningStatus.innerText = "Đang tìm hình ảnh...";
      scanningStatus.style.color = "#fff";
      scanGuide.style.display = "block";
      videoEl.pause();
    });
  </script>
</body>
</html>
