<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artivive Web Clone - Image Tracking AR</title>
  
  <!-- Nhúng thư viện A-Frame -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <!-- Nhúng thư viện MindAR dành cho A-Frame -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #000;
    }

    /* Giao diện hướng dẫn ban đầu */
    #ui-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    p {
      font-size: 16px;
      max-width: 400px;
      line-height: 1.5;
      margin-bottom: 30px;
    }

    #start-btn {
      padding: 15px 30px;
      font-size: 18px;
      font-weight: bold;
      color: white;
      background-color: #e91e63;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      transition: background-color 0.3s, transform 0.1s;
    }

    #start-btn:hover {
      background-color: #d81557;
    }

    #start-btn:active {
      transform: scale(0.95);
    }

    /* Thông báo trạng thái quét */
    #scanning-status {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.9);
      color: #333;
      padding: 10px 20px;
      border-radius: 20px;
      font-weight: bold;
      z-index: 1000;
      display: none;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

  <!-- Màn hình chào mừng và yêu cầu tương tác -->
  <div id="ui-overlay">
    <h1>Trải Nghiệm WebAR</h1>
    <p>Nhấn "Bắt đầu", cho phép truy cập Camera và hướng camera vào bức ảnh của bạn để xem video!</p>
    <button id="start-btn">Bắt Đầu Trải Nghiệm</button>
  </div>

  <div id="scanning-status">Đang tìm kiếm hình ảnh...</div>

  <!-- Cấu hình Scene -->
  <a-scene 
    mindar-image="imageTargetSrc: data.mind; autoStart: false; uiScanning: #scanning-status; filterMinCF:0.0001; filterBeta: 0.001;" 
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">
    
    <a-assets>
      <!-- Đảm bảo video.mp4 nằm cùng thư mục với file này -->
      <video id="ar-video" 
             src="video.mp4" 
             crossorigin="anonymous" 
             loop="true" 
             muted="false"
             playsinline 
             webkit-playsinline>
      </video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Lưu ý: targetIndex phải khớp với thứ tự ảnh khi bạn tạo file .mind -->
    <a-entity id="target" mindar-image-target="targetIndex: 0">
      <!-- Tăng kích thước mặc định lên 1x1 để dễ quan sát ban đầu -->
      <a-video src="#ar-video" position="0 0 0" width="1" height="1" rotation="0 0 0"></a-video>
    </a-entity>
    
  </a-scene>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const startBtn = document.querySelector("#start-btn");
      const uiOverlay = document.querySelector("#ui-overlay");
      const sceneEl = document.querySelector('a-scene');
      const videoEl = document.querySelector('#ar-video');
      const targetEl = document.querySelector('#target');
      const scanningStatus = document.querySelector('#scanning-status');

      startBtn.addEventListener("click", function() {
        uiOverlay.style.display = "none";
        scanningStatus.style.display = "block";
        
        // Khởi động hệ thống AR
        sceneEl.systems["mindar-image-system"].start();
        
        // Một số trình duyệt yêu cầu video phải load trước
        videoEl.load();
      });

      targetEl.addEventListener("targetFound", event => {
        console.log("Tìm thấy ảnh!");
        scanningStatus.innerText = "Đã nhận diện thành công!";
        scanningStatus.style.backgroundColor = "#4caf50";
        scanningStatus.style.color = "white";
        
        // Buộc video phát lại từ đầu khi tìm thấy ảnh
        videoEl.currentTime = 0;
        videoEl.play().catch(err => console.log("Lỗi phát video:", err));
      });

      targetEl.addEventListener("targetLost", event => {
        console.log("Mất dấu!");
        scanningStatus.innerText = "Đang quét tìm hình ảnh...";
        scanningStatus.style.backgroundColor = "rgba(255, 255, 255, 0.9)";
        scanningStatus.style.color = "#333";
        videoEl.pause();
      });
    });
  </script>
</body>
</html>
